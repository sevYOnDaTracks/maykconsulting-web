<div class="example-container admin-theme admin-shell" [class.example-is-mobile]="mobileQuery.matches">
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>

  <mat-toolbar class="fixed-toolbar">
    <div class="admin-nav-shell">
      <button mat-icon-button class="menu-btn" (click)="snav.toggle()">
        <mat-icon>menu</mat-icon>
      </button>

      <a routerLink="/admin" class="brand-link">
        <img src="assets/images/logoB.png" alt="Maykconsulting logo" class="brand-full-logo">
      </a>

      <nav class="desktop-nav">
        <a
          *ngFor="let nav of topNav; trackBy: trackByFn"
          [routerLink]="nav.path"
          routerLinkActive="active-nav-link"
          [routerLinkActiveOptions]="{ exact: nav.path === '/admin/' }"
          class="nav-link"
        >
          {{ nav.label }}
        </a>

        <button *ngIf="isAdmin" mat-button [matMenuTriggerFor]="adminDesktopMenu" class="nav-link nav-menu-link">
          Administration
          <mat-icon>expand_more</mat-icon>
        </button>
      </nav>

      <div class="actions">
        <button mat-icon-button class="icon-btn profile-photo-btn" routerLink="/admin/user" aria-label="Profil">
          <img
            *ngIf="user"
            [src]="user.identityPhotoUrl ? user.identityPhotoUrl : 'assets/images/landing/lOGO_d/consulting.png'"
            alt="Photo de profil"
            class="user-photo"
          >
          <mat-icon *ngIf="!user">person</mat-icon>
        </button>

        <button mat-icon-button class="icon-btn" [matMenuTriggerFor]="notificationMenu" aria-label="Notifications">
          <mat-icon [matBadge]="demandesCount" [matBadgeColor]="demandesCount === 0 ? 'primary' : 'warn'">notifications</mat-icon>
        </button>

        <button mat-icon-button class="icon-btn" [matMenuTriggerFor]="accountMenu" aria-label="Actions">
          <mat-icon>more_vert</mat-icon>
        </button>
      </div>
    </div>
  </mat-toolbar>

  <mat-menu #adminDesktopMenu="matMenu">
    <button *ngFor="let nav of adminNav" mat-menu-item [routerLink]="nav.path">
      <mat-icon>{{ nav.icon }}</mat-icon>
      <span>{{ nav.label }}</span>
    </button>
  </mat-menu>

  <mat-menu #notificationMenu="matMenu">
    <button *ngIf="hebergementData" mat-menu-item routerLink="/admin/hebergement">
      <mat-icon>weekend</mat-icon>
      <span>Hebergement : {{ hebergementData?.dateDemande ? 'Ouvert...' : 'Aucune demande' }}</span>
    </button>
    <button *ngIf="admissionData" mat-menu-item routerLink="/admin/admission">
      <mat-icon>school</mat-icon>
      <span>Admission : {{ admissionData?.dateDemande ? 'Ouvert...' : 'Aucune demande' }}</span>
    </button>
    <button *ngIf="financeData" mat-menu-item routerLink="/admin/finance">
      <mat-icon>work</mat-icon>
      <span>Garant financier : {{ financeData?.dateDemande ? 'Ouvert...' : 'Aucune demande' }}</span>
    </button>
    <span *ngIf="demandesCount === 0" class="empty-notification">Rien par ici...</span>
  </mat-menu>

  <mat-menu #accountMenu="matMenu">
    <button mat-menu-item routerLink="/admin">
      <mat-icon>home</mat-icon>
      <span>Accueil</span>
    </button>
    <button mat-menu-item routerLink="/admin/user">
      <mat-icon>person</mat-icon>
      <span>Mon compte</span>
    </button>
    <button (click)="signOut()" mat-menu-item>
      <mat-icon>power</mat-icon>
      <span>Deconnexion</span>
    </button>
  </mat-menu>

  <mat-sidenav-container class="example-sidenav-container">
    <mat-sidenav
      #snav
      class="custom-sidenav"
      mode="over"
      [opened]="false"
      [fixedInViewport]="mobileQuery.matches"
      [fixedTopGap]="mobileQuery.matches ? 78 : 0"
    >
      <div class="mobile-nav-title">Navigation</div>
      <mat-nav-list>
        <a
          *ngFor="let nav of fillerNav; trackBy: trackByFn"
          mat-list-item
          (click)="snav.close()"
          [routerLink]="nav.path"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: nav.path === '/admin/' }"
        >
          <mat-icon>{{ nav.icon }}</mat-icon>
          <span>{{ nav.label }}</span>
        </a>

        <mat-list-item *ngIf="isAdmin" class="admin-toggle" (click)="toggleAdminMenu()">
          <mat-icon>admin_panel_settings</mat-icon>
          <span>Administration</span>
          <mat-icon>{{ showAdminMenu ? 'expand_less' : 'expand_more' }}</mat-icon>
        </mat-list-item>

        <div *ngIf="showAdminMenu && isAdmin" class="admin-sub-links">
          <a *ngFor="let nav of adminNav" mat-list-item [routerLink]="nav.path" (click)="snav.close()">
            <mat-icon>{{ nav.icon }}</mat-icon>
            <span>{{ nav.label }}</span>
          </a>
        </div>
      </mat-nav-list>
    </mat-sidenav>

    <mat-sidenav-content class="admin-content">
      <main class="admin-main">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
