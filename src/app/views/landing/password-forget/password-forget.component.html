<section class="flex min-h-screen items-center px-4 py-6">
  <div class="mx-auto w-full max-w-md">
    <div class="glass-card p-6 sm:p-7">
      <div class="mb-5 flex justify-center">
        <a routerLink="/" class="inline-flex">
          <img src="assets/images/landing/lOGO_d/logo.png" alt="Maykconsulting logo" class="h-14 w-14 rounded-xl border border-slate-300/70 bg-white/95 p-1.5 object-contain shadow-[0_10px_28px_rgba(0,0,0,0.28)]" />
        </a>
      </div>

      <h1 class="text-center text-3xl font-semibold text-white">Mot de passe oublie</h1>
      <p class="mt-1 text-center text-sm text-white/95">Entrez votre email pour recevoir un lien.</p>

      <div *ngIf="mailSend" class="mt-4 rounded-xl border border-emerald-300/40 bg-emerald-400/15 px-4 py-3 text-sm font-semibold text-emerald-200">
        Si votre email existe chez nous, un lien de reinitialisation a ete envoye.
      </div>

      <form [formGroup]="forgotPasswordForm" (ngSubmit)="sendResetPasswordLink()" class="mt-5 space-y-4">
        <label class="block">
          <span class="mb-1.5 block text-sm font-semibold text-slate-200">Email</span>
          <input type="email" class="input-dark" formControlName="email" id="email" placeholder="vous@email.com" />
        </label>

        <button class="mk-btn-primary w-full" type="submit" [disabled]="loading">
          <ng-container *ngIf="!loading; else loadingTemplate">Envoyer le lien</ng-container>
          <ng-template #loadingTemplate>
            <div class="flex items-center justify-center">
              <mat-spinner diameter="22"></mat-spinner>
            </div>
          </ng-template>
        </button>
      </form>

      <p class="mt-4 text-center text-sm">
        <a routerLink="/login" class="font-semibold text-cyan-300 hover:text-cyan-200">Retour connexion</a>
      </p>

      <p class="mt-2 text-center text-sm">
        <a routerLink="/" class="font-semibold text-white/95 hover:text-white">Retour a l'accueil</a>
      </p>
    </div>
  </div>
</section>
