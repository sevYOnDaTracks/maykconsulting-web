<section id="intro-wrap" class="px-4 pb-16 pt-52 sm:pb-20 sm:pt-52">
  <div class="mx-auto grid max-w-7xl items-center gap-8 lg:grid-cols-[1.02fr_0.98fr]">
    <div>
      <div class="mb-5 inline-flex items-center gap-2 rounded-full border border-cyan-400/25 bg-cyan-400/10 px-3.5 py-1.5">
        <span class="h-1.5 w-1.5 animate-pulse rounded-full bg-cyan-400"></span>
        <span class="text-xs font-bold uppercase tracking-[0.16em] text-cyan-300">Accompagnement etudiant</span>
      </div>

      <h1 class="max-w-[12ch] text-4xl font-semibold leading-[1.05] text-white sm:text-5xl lg:text-[3.8rem]">
        Etudiez en France, Canada ou Belgique.
      </h1>

      <p class="mt-5 max-w-2xl text-lg leading-8 text-white/80">
        Un accompagnement clair vers une admission, le visa, des logements et/ou une garantie financiere.
      </p>

      <div class="mt-7 flex flex-wrap gap-3">
        <a routerLink="/register" class="mk-btn-primary">Demarrer maintenant</a>
        <a href="#" scrollTo="contacts-wrap" class="btn-ghost">Parler a un conseiller</a>
      </div>

      <div class="mt-7 grid max-w-xl gap-3 sm:grid-cols-3">
        <div class="glass-card px-4 py-3">
          <div class="mb-1.5 flex h-8 w-8 items-center justify-center rounded-lg bg-cyan-400/15">
            <mat-icon class="!h-[1.1rem] !w-[1.1rem] !text-[1.1rem] text-cyan-300">public</mat-icon>
          </div>
          <p class="text-2xl font-bold text-white">+3</p>
          <p class="text-xs text-white/70">Pays couverts</p>
        </div>
        <div class="glass-card px-4 py-3">
          <div class="mb-1.5 flex h-8 w-8 items-center justify-center rounded-lg bg-cyan-400/15">
            <mat-icon class="!h-[1.1rem] !w-[1.1rem] !text-[1.1rem] text-cyan-300">layers</mat-icon>
          </div>
          <p class="text-2xl font-bold text-white">4</p>
          <p class="text-xs text-white/70">Services</p>
        </div>
        <div class="glass-card px-4 py-3">
          <div class="mb-1.5 flex h-8 w-8 items-center justify-center rounded-lg bg-cyan-400/15">
            <mat-icon class="!h-[1.1rem] !w-[1.1rem] !text-[1.1rem] text-cyan-300">verified</mat-icon>
          </div>
          <p class="text-2xl font-bold text-white">100%</p>
          <p class="text-xs text-white/70">Accompagne</p>
        </div>
      </div>
    </div>

    <div class="relative">
      <div class="pointer-events-none absolute inset-0 -z-10 rounded-[2rem] bg-gradient-to-tr from-cyan-300/30 to-indigo-300/25 blur-2xl"></div>
      <div class="glass-card p-4 sm:p-4">
        <img
          src="./assets/images/home.png"
          alt="Presentation Maykconsulting"
          class="w-full rounded-xl object-cover"
          [@animate]="{
            value: '*',
            params: { x: '100px', opacity: '0', delay: '100ms', duration: '1000ms' }
          }"
        />
      </div>
    </div>
  </div>
</section>
